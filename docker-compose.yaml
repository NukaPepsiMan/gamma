services:
  postgres:
    image: postgres:16-alpine
    container_name: gamma-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gamma_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kafka:
    image: apache/kafka-native:3.8.0
    container_name: gamma-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
    volumes:
      - kafka-data:/var/lib/kafka/data

  wiremock:
    image: wiremock/wiremock:latest
    container_name: gamma-wiremock
    ports:
      - "8089:8080"
    command: ["--global-response-templating", "--disable-gzip"]
    volumes:
      - ./wiremock-mappings:/home/wiremock/mappings

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: gamma-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8081:8080"

  app:
    build: .
    container_name: gamma-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      postgres:
        condition: service_started
      kafka:
        condition: service_started
      keycloak:
        condition: service_started

volumes:
  postgres-data:
  kafka-data: